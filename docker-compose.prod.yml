services:
    # ── MongoDB ──────────────────────────────────────────────────────────────────
    db:
        image: mongo:7
        container_name: mongo
        restart: unless-stopped
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
            MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
        volumes:
            - mongo_data:/data/db
        networks:
            - app-network
        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5

    # ── Backend (Express + Mongoose) ──────────────────────────────────────────────
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: backend
        restart: unless-stopped
        ports:
            - "5000:5000"
        environment:
            NODE_ENV: production
            PORT: 5000
            MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@db:27017/${MONGO_DB_NAME}?authSource=admin
        depends_on:
            db:
                condition: service_healthy
        networks:
            - app-network

    # ── Frontend (Vite build served by `serve`) ───────────────────────────────────
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: frontend
        restart: unless-stopped
        ports:
            - "3000:3000"
        networks:
            - app-network

volumes:
    mongo_data:

networks:
    app-network:
        driver: bridge
